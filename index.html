<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>V4 · Supply Chain Validator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%236366f1'/><text y='22' x='4' font-size='15' font-weight='700' fill='white' font-family='Inter,sans-serif'>V4</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="src/css/app.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo-mark">V4</div>
      <div>
        <div class="login-title">Supply Chain Validator</div>
        <div class="login-sub">L'Oréal Professional · India → UK</div>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Username</label>
      <input class="field-input" id="l-user" type="text" placeholder="Username" autocomplete="username" onkeydown="if(event.key==='Enter')$id('l-pass').focus()"/>
    </div>
    <div class="field-group" style="margin-top:12px">
      <label class="field-label">Password</label>
      <input class="field-input" id="l-pass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')Auth.login()"/>
    </div>
    <div id="login-err" class="login-err" hidden>Incorrect credentials</div>
    <button class="btn btn-primary" style="width:100%;margin-top:18px;justify-content:center" onclick="Auth.login()">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app" hidden>
  <aside id="sidebar">
    <div class="sb-brand">
      <div class="logo-mark sm">V4</div>
      <div>
        <div class="sb-title">Supply Chain</div>
        <div class="sb-sub">Validator</div>
      </div>
    </div>
    <nav class="sb-nav">
      <a class="sb-link active" data-page="dashboard" onclick="Nav.go('dashboard')">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </a>
      <a class="sb-link" data-page="lots" onclick="Nav.go('lots')">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6l7-3 7 3v8l-7 3-7-3V6z"/><path d="M10 3v14M3 6l7 3 7-3"/></svg>
        Shipment Lots
        <span class="sb-pill" id="sb-lots">0</span>
      </a>
      <a class="sb-link" data-page="skus" onclick="Nav.go('skus')">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="5" width="16" height="12" rx="1.5"/><line x1="2" y1="9" x2="18" y2="9"/><line x1="6" y1="9" x2="6" y2="17"/></svg>
        SKU Master
        <span class="sb-pill" id="sb-skus">0</span>
      </a>
    </nav>
    <div class="sb-footer">
      <button class="sb-btn" onclick="Data.exportBackup()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 13V3m-4 6l4 4 4-4"/><path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1"/></svg>
        Export backup
      </button>
      <button class="sb-btn" onclick="$id('bk-file').click()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 7v10m-4-4l4 4 4-4"/><path d="M3 5V4a1 1 0 011-1h12a1 1 0 011 1v1"/></svg>
        Import backup
      </button>
      <button class="sb-btn danger" onclick="Auth.logout()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 3h4a1 1 0 011 1v12a1 1 0 01-1 1h-4M8 14l4-4-4-4M12 10H2"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <main id="main">
    <div id="page-root"></div>
  </main>
</div>

<!-- DRAWER -->
<div id="drawer-bg" onclick="Drawer.close()"></div>
<div id="drawer">
  <div id="drawer-inner"></div>
</div>

<!-- TOAST -->
<div id="toasts"></div>

<!-- hidden file inputs -->
<input type="file" id="bk-file"  accept=".json"       style="display:none" onchange="Data.importBackup(event)"/>
<input type="file" id="xl-file"  accept=".xlsx,.xls"  style="display:none"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="src/js/auth.js"></script>
<script src="src/js/store.js"></script>
<script src="src/js/validate.js"></script>
<script src="src/js/ui.js"></script>
<script src="src/js/data.js"></script>
<script src="src/js/pages/dashboard.js"></script>
<script src="src/js/pages/lots.js"></script>
<script src="src/js/pages/lot-detail.js"></script>
<script src="src/js/pages/skus.js"></script>
<script src="src/js/nav.js"></script>
</body>
</html>
